<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders – SmartVend</title>
    <meta name="description" content="Your SmartVend order history. Track and manage your orders." />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏧</text></svg>" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .orders-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .order-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .order-id {
            font-family: monospace;
            font-weight: 700;
            color: var(--text-primary);
        }

        .order-status {
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-paid {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }

        .status-dispensed {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .order-body {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .order-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .item-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .item-price {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .order-date {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .loading,
        .no-results {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body data-page="orders">

    <!-- ── Navbar ──────────────────────────────────────────── -->
    <nav class="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🏧</div>
                SmartVend
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="products.html" class="nav-link">Products</a>
                <a href="orders.html" class="nav-link active">Orders</a>
            </div>
            <div class="nav-actions">
                <a href="cart.html" class="cart-btn">
                    🛒 Cart
                    <span class="cart-badge"></span>
                </a>
                <button class="hamburger" aria-label="Menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <div class="mobile-nav">
        <div class="mobile-nav-panel">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="products.html" class="nav-link">🛍️ Products</a>
            <a href="orders.html" class="nav-link active">📦 Orders</a>
        </div>
    </div>

    <!-- ── Page Hero ────────────────────────────────────────── -->
    <div class="page-hero">
        <div class="container">
            <h1>📦 My Orders</h1>
            <p>View and track your recent purchases</p>
        </div>
    </div>

    <main>
        <div class="orders-container" id="orders-list">
            <!-- Rendered by script.js -->
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
